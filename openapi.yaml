openapi: 3.1.1
info:
  title: API de Certificados
  version: 1.0.0
  description: API para gerenciar usuários, autenticação e certificados de verificação de idade

servers:
  - url: http://localhost:3000

tags:
  - name: Auth
  - name: Usuarios
  - name: Certificados
  - name: Verificacao

paths:
  /auth/login:
    post:
      summary: Realizar login por email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEntrada'
            example:
              email: luiggi@email.com
      responses:
        200:
          description: Token gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResposta'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.exemplo
        400:
          description: Email obrigatório
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Email obrigatório
        401:
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Credenciais inválidas

  /usuarios:
    post:
      summary: Criar usuário
      tags: [Usuarios]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioEntrada'
            example:
              nome: Luiggi Fulano
              email: luiggi@email.com
              dataNascimento: "2004-04-04T00:00:00.000Z"
      responses:
        201:
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nome: Luiggi Fulano
                email: luiggi@email.com
                dataNascimento: "2004-04-04T00:00:00.000Z"
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              examples:
                dadosInvalidos:
                  value:
                    erro: Dados inválidos
                idInvalido:
                  value:
                    erro: Dados inválidos
        409:
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Email já cadastrado

    get:
      summary: Listar usuários
      tags: [Usuarios]
      responses:
        200:
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
              example:
                - id: 1
                  nome: Luiggi Fulano
                  email: luiggi@email.com
                  dataNascimento: "2004-04-04T00:00:00.000Z"

  /usuarios/{id}:
    get:
      summary: Buscar usuário por ID
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        200:
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nome: Luiggi Fulano
                email: luiggi@email.com
                dataNascimento: "2004-04-04T00:00:00.000Z"
        404:
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Usuário não encontrado

    put:
      summary: Atualizar usuário
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioEntrada'
            example:
              nome: Novo Nome
              email: novo@email.com
              dataNascimento: "2000-01-01T00:00:00.000Z"
      responses:
        200:
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nome: Novo Nome
                email: novo@email.com
                dataNascimento: "2000-01-01T00:00:00.000Z"
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Dados inválidos
        404:
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Usuário não encontrado

    delete:
      summary: Remover usuário
      tags: [Usuarios]
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        204:
          description: Usuário removido
        404:
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Usuário não encontrado

  /usuarios/{id}/certificados:
    post:
      summary: Emitir certificado de idade
      tags: [Certificados]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificadoEntrada'
            example:
              idadeMinima: 18
      responses:
        201:
          description: Certificado emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificado'
              example:
                id: 1
                usuarioId: 1
                idadeMinima: 18
                emitidoEm: "2026-04-07T12:00:00.000Z"
                expiraEm: "2026-05-07T12:00:00.000Z"
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Dados inválidos
        401:
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              examples:
                semToken:
                  value:
                    erro: Token não fornecido
                tokenInvalido:
                  value:
                    erro: Token inválido
        403:
          description: Acesso negado para operar certificado de outro usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Acesso negado
        404:
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Usuário não encontrado

    get:
      summary: Listar certificados do usuário
      tags: [Certificados]
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        200:
          description: Lista de certificados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Certificado'
              example:
                - id: 1
                  usuarioId: 1
                  idadeMinima: 18
                  emitidoEm: "2026-04-07T12:00:00.000Z"
                  expiraEm: "2026-05-07T12:00:00.000Z"
        404:
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Usuário não encontrado

  /certificados/{id}:
    get:
      summary: Buscar certificado por ID
      tags: [Certificados]
      parameters:
        - $ref: '#/components/parameters/CertificadoId'
      responses:
        200:
          description: Certificado encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificado'
              example:
                id: 1
                usuarioId: 1
                idadeMinima: 18
                emitidoEm: "2026-04-07T12:00:00.000Z"
                expiraEm: "2026-05-07T12:00:00.000Z"
        404:
          description: Certificado não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Certificado não encontrado

    delete:
      summary: Revogar certificado
      tags: [Certificados]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CertificadoId'
      responses:
        204:
          description: Certificado revogado
        401:
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              examples:
                semToken:
                  value:
                    erro: Token não fornecido
                tokenInvalido:
                  value:
                    erro: Token inválido
        403:
          description: Acesso negado para remover certificado de outro usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Acesso negado
        404:
          description: Certificado não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Certificado não encontrado

  /certificados/{id}/verificar:
    post:
      summary: Verificar validade do certificado
      tags: [Verificacao]
      parameters:
        - $ref: '#/components/parameters/CertificadoId'
      responses:
        200:
          description: Resultado da verificação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificacaoResposta'
              example:
                valido: true
                atendeRequisito: true
        404:
          description: Certificado não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: Certificado não encontrado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UsuarioId:
      name: id
      in: path
      required: true
      schema:
        type: integer

    CertificadoId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Erro:
      type: object
      properties:
        erro:
          type: string
          example: Usuário não encontrado

    LoginEntrada:
      type: object
      required: [email]
      properties:
        email:
          type: string
          example: luiggi@email.com

    LoginResposta:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.exemplo

    Usuario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Luiggi Fulano
        email:
          type: string
          example: luiggi@email.com
        dataNascimento:
          type: string
          format: date-time
          example: "2004-04-04T00:00:00.000Z"

    UsuarioEntrada:
      type: object
      required: [nome, email, dataNascimento]
      properties:
        nome:
          type: string
          example: Luiggi Fulano
        email:
          type: string
          example: luiggi@email.com
        dataNascimento:
          type: string
          format: date-time
          example: "2004-04-04T00:00:00.000Z"
      additionalProperties: false

    Certificado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        usuarioId:
          type: integer
          example: 1
        idadeMinima:
          type: integer
          example: 18
        emitidoEm:
          type: string
          format: date-time
          example: "2026-04-07T12:00:00.000Z"
        expiraEm:
          type: string
          format: date-time
          example: "2026-05-07T12:00:00.000Z"

    CertificadoEntrada:
      type: object
      required: [idadeMinima]
      properties:
        idadeMinima:
          type: integer
          example: 18
      additionalProperties: false

    VerificacaoResposta:
      type: object
      properties:
        valido:
          type: boolean
          example: true
        atendeRequisito:
          type: boolean
          example: true